<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>WeatherMe MVP</title>
<button onclick="showHistory()">
📜 履歴を見る
</button>
<style>

body{
    font-family:sans-serif;
    margin:0;
    background:#f4f7fb;
}

header{
    background:#4a90e2;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    max-width:600px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

textarea{
    width:100%;
    height:120px;
    padding:10px;
}
<label>今の気持ち</label>

<input
id="mood"
type="range"
min="1"
max="5"
value="3">

<p id="moodText">😐 普通</p>
select{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#4a90e2;
    color:white;
    cursor:pointer;
}

.weather{
    background:#eef7ff;
    padding:15px;
    border-radius:10px;
    white-space:pre-line;
}
input[type=range]{
    width:100%;
    margin-top:10px;
}

#moodText{
    text-align:center;
    font-size:18px;
}

body{
    background:
    linear-gradient(
      180deg,
      #6ec6ff,
      #f4f7fb
    );
}

.card{
    backdrop-filter:blur(8px);
}
</style>
</head>

<body>

<header>
<h1>☁ WeatherMe</h1>
</header>

<div class="container">

<div class="card">

<h2>裏庭</h2>

<textarea
id="emotion"
placeholder="モヤモヤを書いてください"></textarea>

<select id="situation">
<option>連絡のすれ違い</option>
<option>デート中</option>
<option>仕事が忙しい</option>
<option>家事</option>
<option>その他</option>
</select>

<button onclick="createForecast()">
天気予報を作る
</button>

</div>

<div class="card">

<h2>表庭</h2>

<div id="forecast" class="weather">
まだ予報はありません
</div>

</div>

</div>

<script>
const moodSlider =
document.getElementById("mood");

const moodText =
document.getElementById("moodText");

moodSlider.addEventListener("input",()=>{

```
const value =
  Number(moodSlider.value);

const moods = {
    1:"😭 とてもつらい",
    2:"☔ モヤモヤ",
    3:"😐 普通",
    4:"🌤 少し前向き",
    5:"☀ ごきげん"
};

moodText.textContent =
  moods[value];
```

});

if(mood <= 2){
    icon = "☔";
}
else if(mood === 3){
    icon = "☁";
}

const fortune =
  Math.floor(Math.random()*41)+60;

let forecast = "";

switch(situation){

    case "連絡のすれ違い":

        forecast =

        forecast =

大切にすると運気上昇。

スマホを見る時間を減らすと
良い流れが生まれそうです。

恋愛運 ${fortune}%`;

    case "仕事が忙しい":

        forecast =

`${icon} お疲れさま予報

今日は少し余裕を持つと吉。

感謝のひと言が
幸運を呼びます。

恋愛運 ${fortune}%`;

```
        break;

    case "家事":

        forecast =
```

`${icon} 家庭運アップ

小さな手伝いが
大きな幸運を呼びます。

ありがとうの言葉が
ラッキーアイテム。

    default:

        forecast =

優しい声掛けが
良い流れを生みます。

恋愛運 ${fortune}%`;
}

```
document.getElementById("forecast")
  .innerText = forecast;

localStorage.setItem(
  "forecast",
  forecast
);

const history =
  JSON.parse(
    localStorage.getItem("weatherHistory")
    || "[]"
  );

history.push({
    date:new Date().toLocaleString(),
    situation,
    mood,
    forecast
});

localStorage.setItem(
  "weatherHistory",
  JSON.stringify(history)
);
```

}

function showHistory(){

```
const history =
  JSON.parse(
    localStorage.getItem("weatherHistory")
    || "[]"
  );

if(history.length === 0){

    alert("履歴がありません");
    return;
}

let text = "";

history.reverse().forEach(item=>{

    text +=
      item.date +
      "\n" +
      item.forecast +
      "\n\n";
});

alert(text);
```

}

window.onload = ()=>{

```
const saved =
  localStorage.getItem("forecast");

if(saved){

    document.getElementById("forecast")
      .innerText = saved;
}
```

};

</script>

</body>
</html>
